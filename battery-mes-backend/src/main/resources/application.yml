# Base application configuration.
server:
  port: 8081

spring:
  application:
    name: battery-mes-backend
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/orcl
    username: ${DB_USERNAME:scott}
    password: ${DB_PASSWORD:tiger}
    driver-class-name: oracle.jdbc.OracleDriver
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.battery.mes.domain,com.battery.mes.dto
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    operationsSorter: alpha
    tagsSorter: alpha
    display-request-duration: true

jwt:
  secret: ${JWT_SECRET:battery-mes-secret-key-battery-mes-secret-key-123456}
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

app:
  sample-data:
    enabled: false

logging:
  level:
    root: info
    com.battery.mes.mapper: info

python:
  base-url: http://localhost:8000
