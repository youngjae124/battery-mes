apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: battery-mes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: battery-mes-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: battery-mes
spec:
  type: LoadBalancer   # EKS에서 AWS ALB/NLB로 자동 연결됨
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
