version: "3.9"

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: battery-mes-postgres
    environment:
      POSTGRES_DB:       ${DB_NAME:-battery_mes_qms}
      POSTGRES_USER:     ${DB_USERNAME:-battery_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-battery_pass}
      PGTZ:              Asia/Seoul
      TZ:                Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./battery-mes-backend/src/main/resources/db/schema-postgresql.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./battery-mes-backend/src/main/resources/db/data-postgresql.sql:/docker-entrypoint-initdb.d/02_data.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-battery_user} -d ${DB_NAME:-battery_mes_qms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  python-analysis:
    build:
      context: ./battery-mes-python
    container_name: battery-mes-python
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL:      postgresql://${DB_USERNAME:-battery_user}:${DB_PASSWORD:-battery_pass}@postgres-db:5432/${DB_NAME:-battery_mes_qms}
      GEMINI_API_KEY:  ${GEMINI_API_KEY}
      GEMINI_MODEL:    gemini-2.5-flash-lite
      TZ:              Asia/Seoul
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./battery-mes-backend
    container_name: battery-mes-backend
    ports:
      - "8082:8081"
    environment:
      SPRING_DATASOURCE_URL:        jdbc:postgresql://postgres-db:5432/${DB_NAME:-battery_mes_qms}
      SPRING_DATASOURCE_USERNAME:   ${DB_USERNAME:-battery_user}
      SPRING_DATASOURCE_PASSWORD:   ${DB_PASSWORD:-battery_pass}
      SPRING_DATASOURCE_DRIVER:     org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET:      ${JWT_SECRET}
      PYTHON_BASE_URL: http://python-analysis:8000
      JAVA_OPTS:       "-Xmx256m -Xms128m -Duser.timezone=Asia/Seoul"
      TZ:              Asia/Seoul
    depends_on:
      postgres-db:
        condition: service_healthy
      python-analysis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./battery-mes-frontend
    container_name: battery-mes-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
